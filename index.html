<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />

    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https:; object-src 'none'; base-uri 'self'; form-action 'self'"
    />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <title>MANTLE</title>

    <meta
      name="description"
      content="It starts with a reach inward. Step into the ring with Mantle."
    />

    <meta name="theme-color" content="#ffffff" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="MANTLE" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="application-name" content="MANTLE" />

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #ffffff;
      }

      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 10000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        padding:
          max(28px, env(safe-area-inset-top, 0px))
          24px
          max(28px, env(safe-area-inset-bottom, 0px));
        background:
          radial-gradient(
            ellipse 80% 50% at 50% 0%,
            rgba(138, 46, 46, 0.06),
            transparent 55%
          ),
          linear-gradient(180deg, #ffffff 0%, #f7f5f3 100%);
        color: #0a0a0a;
        transition: opacity 280ms ease;
      }

      #boot-splash.is-leaving {
        opacity: 0;
        pointer-events: none;
      }

      #boot-splash img {
        width: min(128px, 34vw);
        height: auto;
        display: block;
      }

      #boot-splash .boot-name {
        margin: 0;
        font-family:
          "Bebas Neue", "Anton", Impact, "Arial Narrow Bold", sans-serif;
        font-size: clamp(48px, 14vw, 72px);
        font-weight: 400;
        letter-spacing: 0.08em;
        line-height: 0.92;
      }
    </style>
  </head>

  <body>
    <div id="boot-splash" role="status" aria-label="MANTLE loading">
      <img src="/logo-mark.png" alt="" width="128" height="128" />
      <p class="boot-name">MANTLE</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
